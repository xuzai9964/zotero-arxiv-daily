name: Sync fork with upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge upstream while preserving local automation
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/TideDra/zotero-arxiv-daily.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork already contains upstream/main."
            exit 0
          fi

          git merge --no-ff --no-commit -X ours upstream/main

          # These files are fork-local operational state. Keeping them out of the
          # automatic merge avoids clobbering the self-hosted runner setup and
          # prevents keep-alive-only upstream commits from causing repeat failures.
          git restore --source=HEAD --staged --worktree \
            .github/workflows \
            .github/keep-alive.txt

          cat > /tmp/upstream-sync-commit-message <<'EOF'
          Merge upstream changes without replacing fork automation

          The fork periodically records upstream/main as a merge parent so
          scheduled sync stays fast-forwardable over time. Fork-local GitHub
          workflow files and keep-alive state are restored before committing
          because they encode this repository's runner and scheduling choices.

          Constraint: This fork intentionally differs from upstream under .github for self-hosted Zotero execution.
          Rejected: Force-sync to upstream | would remove fork-local automation.
          Rejected: Leave branches divergent | makes every scheduled sync retry the same failure.
          Confidence: high
          Scope-risk: narrow
          Directive: Preserve .github/workflows unless deliberately migrating back to upstream defaults.
          Tested: Upstream merge command completed in the fork clone.
          Not-tested: Live scheduled sync against a future upstream change.
          EOF
          sed -i 's/^          //' /tmp/upstream-sync-commit-message
          git commit --allow-empty --file /tmp/upstream-sync-commit-message
          git push
